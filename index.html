<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍺 酒馆聊天</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 角色列表页 -->
    <div id="page-home" class="page active">
      <header>
        <h1>🍺 酒馆聊天</h1>
      </header>
      
      <div class="toolbar">
        <input type="text" id="search-input" placeholder="🔍 搜索角色...">
        <button id="create-btn" class="btn-primary">➕ 创建</button>
      </div>
      
      <div class="tag-filters" id="tag-filters">
        <span class="tag" data-tag="温柔">温柔</span>
        <span class="tag" data-tag="活泼">活泼</span>
        <span class="tag" data-tag="冷漠">冷漠</span>
        <span class="tag" data-tag="神秘">神秘</span>
        <span class="tag" data-tag="幽默">幽默</span>
        <span class="tag" data-tag="傲娇">傲娇</span>
        <span class="tag" data-tag="成熟">成熟</span>
        <span class="tag" data-tag="可爱">可爱</span>
        <span class="tag" data-tag="毒舌">毒舌</span>
        <span class="tag" data-tag="善良">善良</span>
      </div>
      
      <div class="character-list" id="character-list">
        <!-- 角色卡片动态生成 -->
      </div>
      
      <div class="empty-state" id="empty-state" style="display: none;">
        <p>还没有角色，点击右上角创建一个吧！</p>
      </div>
    </div>
    
    <!-- 角色创建/编辑页 -->
    <div id="page-create" class="page">
      <header>
        <button id="back-from-create" class="btn-back">← 返回</button>
        <h1 id="create-title">创建角色</h1>
      </header>
      
      <div class="form-container">
        <div class="avatar-upload">
          <div class="avatar-preview" id="avatar-preview">📷</div>
          <input type="file" id="avatar-input" accept="image/*" hidden>
          <button id="upload-avatar-btn" class="btn-secondary">上传头像</button>
          <div class="preset-avatars" id="preset-avatars">
            <span class="preset-avatar" data-emoji="🧑‍🎤">🧑‍🎤</span>
            <span class="preset-avatar" data-emoji="🧔">🧔</span>
            <span class="preset-avatar" data-emoji="👩">👩</span>
            <span class="preset-avatar" data-emoji="🧑">🧑</span>
            <span class="preset-avatar" data-emoji="👴">👴</span>
            <span class="preset-avatar" data-emoji="👵">👵</span>
          </div>
        </div>
        
        <div class="form-group">
          <label>名字 *</label>
          <input type="text" id="char-name" required>
        </div>
        
        <div class="form-group">
          <label>性别 *</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="male"> 男</label>
            <label><input type="radio" name="gender" value="female"> 女</label>
            <label><input type="radio" name="gender" value="other"> 其他</label>
          </div>
        </div>
        
        <div class="form-group">
          <label>性格标签 *（可多选）</label>
          <div class="tag-select" id="personality-select">
            <span class="tag" data-tag="温柔">温柔</span>
            <span class="tag" data-tag="活泼">活泼</span>
            <span class="tag" data-tag="冷漠">冷漠</span>
            <span class="tag" data-tag="神秘">神秘</span>
            <span class="tag" data-tag="幽默">幽默</span>
            <span class="tag" data-tag="傲娇">傲娇</span>
            <span class="tag" data-tag="成熟">成熟</span>
            <span class="tag" data-tag="可爱">可爱</span>
            <span class="tag" data-tag="毒舌">毒舌</span>
            <span class="tag" data-tag="善良">善良</span>
          </div>
        </div>
        
        <div class="form-group">
          <label>背景故事</label>
          <textarea id="char-backstory" rows="4"></textarea>
          <button id="gen-backstory" class="btn-ai">✨ AI 生成</button>
        </div>
        
        <div class="form-group">
          <label>自身描述</label>
          <textarea id="char-description" rows="3"></textarea>
          <button id="gen-description" class="btn-ai">✨ AI 生成</button>
        </div>
        
        <div class="form-actions">
          <button id="cancel-create" class="btn-secondary">取消</button>
          <button id="save-character" class="btn-primary">保存角色</button>
        </div>
      </div>
    </div>
    
    <!-- 聊天页 -->
    <div id="page-chat" class="page">
      <header>
        <button id="back-from-chat" class="btn-back">← 返回</button>
        <div class="chat-header-info">
          <span id="chat-avatar" class="chat-avatar">🧑‍🎤</span>
          <span id="chat-name">角色名</span>
        </div>
        <button id="edit-character" class="btn-icon">⋯</button>
      </header>
      
      <div class="chat-messages" id="chat-messages">
        <!-- 消息动态生成 -->
      </div>
      
      <div class="chat-input-area">
        <input type="text" id="message-input" placeholder="输入消息...">
        <button id="send-message" class="btn-send">➤</button>
      </div>
    </div>
  </div>
  
  <!-- 加载遮罩 -->
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
    <p id="loading-text">加载中...</p>
  </div>
  
  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>
  
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
